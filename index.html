<!DOCTYPE html>
<html>
<head>
  <title>AI Study Assistant 🤖</title>
  <style>
    body {
      background: linear-gradient(to right, #667eea, #764ba2);
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .card {
      background: white;
      padding: 20px;
      border-radius: 15px;
      width: 350px;
      height: 500px;
      display: flex;
      flex-direction: column;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    }

    h1 {
      text-align: center;
      margin-bottom: 10px;
    }

    .chat-box {
      flex: 1;
      overflow-y: auto;
      margin-bottom: 10px;
      padding: 5px;
      border: 1px solid #ddd;
      border-radius: 10px;
    }

    .user {
      text-align: right;
      margin: 5px;
      color: blue;
    }

    .bot {
      text-align: left;
      margin: 5px;
      color: green;
    }

    input {
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #ccc;
      outline: none;
      width: 70%;
    }

    button {
      padding: 10px;
      border: none;
      border-radius: 8px;
      background: #667eea;
      color: white;
      cursor: pointer;
    }

    .input-area {
      display: flex;
      justify-content: space-between;
    }
  </style>
</head>

<body>

  <div class="card">
    <h1>AI Study Assistant 🤖</h1>

    <div class="chat-box" id="chatBox"></div>

    <div class="input-area">
      <input type="text" id="userInput" placeholder="Type your question...">
      <button onclick="reply()">Send</button>
    </div>
  </div>

 <script>
  var input = document.getElementById("userInput");

  input.addEventListener("keypress", function(event) {
    if (event.key === "Enter") {
      reply();
    }
  });

  function reply() {
    var text = input.value.trim().toLowerCase();
    if (text === "") return;

    var chatBox = document.getElementById("chatBox");

    chatBox.innerHTML += "<div class='user'>You: " + text + "</div>";

    var answer = "";

    // Greeting detection
    if (text.includes("hello") || text.includes("hi")) {
      answer = "Hello! 👋 How can I help you today?";
    }

    // Math solving (basic)
    else if (!isNaN(eval(text))) {
      try {
        answer = "The answer is: " + eval(text) + " 📚";
      } catch {
        answer = "That math looks tricky 😅";
      }
    }

    // Physics keyword
    else if (text.includes("physics")) {
      answer = "Physics is the study of matter, energy, and forces ⚛️";
    }

    // Time
    else if (text.includes("time")) {
      var now = new Date();
      answer = "Current time is: " + now.toLocaleTimeString() + " ⏰";
    }

    // Motivation
    else if (text.includes("motivate")) {
      var quotes = [
        "Keep going, you're doing great! 💪",
        "Success comes from consistency 🚀",
        "Small steps daily = big results 🔥"
      ];
      answer = quotes[Math.floor(Math.random() * quotes.length)];
    }

    else {
      answer = "I'm still learning 🤖 Ask me about math, physics, time or say hello!";
    }

    chatBox.innerHTML += "<div class='bot'>Bot: " + answer + "</div>";

    input.value = "";
    chatBox.scrollTop = chatBox.scrollHeight;
  else if (text.includes("time") || text.includes("clock") || text.includes("hour")) {
  var now = new Date();
  answer = "Current time is: " + now.toLocaleTimeString() + " ⏰"
    }
</script>
</body>
</html>
