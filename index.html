<!DOCTYPE html>
<html>
<head>
  <title> AI Study Assistant 🤖</title>
  <style>
    body {
      background: linear-gradient(to right, #667eea, #764ba2);
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }
    .card {
      background: white;
      padding: 20px;
      border-radius: 15px;
      width: 350px;
      height: 500px;
      display: flex;
      flex-direction: column;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    }
    h1 { text-align: center; margin-bottom: 10px; }
    .chat-box {
      flex: 1;
      overflow-y: auto;
      margin-bottom: 10px;
      padding: 5px;
      border: 1px solid #ddd;
      border-radius: 10px;
    }
    .user { text-align: right; margin: 5px; color: blue; }
    .bot { text-align: left; margin: 5px; color: green; }
    input {
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #ccc;
      outline: none;
      width: 70%;
    }
    button {
      padding: 10px;
      border: none;
      border-radius: 8px;
      background: #667eea;
      color: white;
      cursor: pointer;
    }
    .input-area { display: flex; justify-content: space-between; }
  </style>
</head>
<body>
  <div class="card">
    <h1>AI Study Assistant 🤖</h1>
    <div class="chat-box" id="chatBox"></div>
    <div class="input-area">
      <input type="text" id="userInput" placeholder="Type your question...">
      <button onclick="sendMessage()">Send</button>
    </div>
  </div>

<script>
  const input = document.getElementById("userInput");
  const chatBox = document.getElementById("chatBox");

  input.addEventListener("keypress", function(event) {
    if(event.key === "Enter") sendMessage();
  });

  function sendMessage() {
    const text = input.value.trim();
    if(!text) return;

    chatBox.innerHTML += `<div class='user'>You: ${text}</div>`;
    const lower = text.toLowerCase();
    let answer = "";

    // 1️⃣ Keywords first
    const greetings = ["hello","hi","hey","good morning","good afternoon","good evening"];
    if(greetings.some(g => lower.includes(g))) {
      answer = "Hello! 👋 How can I help you today?";
    }
    else if(lower.includes("physics")) {
      answer = "Physics is the study of matter, energy, and forces ⚛️";
    }
    else if(lower.includes("chemistry")) {
      answer = "Chemistry is the study of substances and how they interact ⚗️";
    }
    else if(lower.includes("math")) {
      answer = "Math helps us understand numbers, patterns, and logic 🧮";
    }
    else if(lower.includes("time") || lower.includes("clock") || lower.includes("hour")) {
      answer = `Current time is: ${new Date().toLocaleTimeString()} ⏰`;
    }
    else if(lower.includes("motivate") || lower.includes("inspire") || lower.includes("encourage")) {
      const quotes = [
        "Keep going, you're doing great! 💪",
        "Success comes from consistency 🚀",
        "Small steps daily = big results 🔥"
      ];
      answer = quotes[Math.floor(Math.random() * quotes.length)];
    }
    // 2️⃣ Only evaluate if the text is a math expression (numbers and math symbols only)
    else if(/^[0-9+\-*/(). ]+$/.test(lower)) {
      try { answer = `The answer is: ${eval(lower)} 📚`; } 
      catch { answer = "Hmm, that math looks tricky 😅"; }
    }
    // 3️⃣ Fallback
    else {
      answer = "I'm still learning 🤖 Ask me about math, physics, chemistry, time or say hello!";
    }

    chatBox.innerHTML += `<div class='bot'>Bot: ${answer}</div>`;
    input.value = "";
    chatBox.scrollTop = chatBox.scrollHeight;
  }
</script>
</body>
</html>
